name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 1. 安装构建依赖
      - run: |
          pip install mkdocs-material \
            mkdocs-roamlinks-plugin \
            mkdocs-rss-plugin \
            mkdocs-static-i18n \
            mkdocs-awesome-pages-plugin \
            mkdocs-mermaid2-plugin

      # 2. 生成静态站点（构建到 site 目录）
      - run: mkdocs build

      # 3. 部署到 GitHub Pages（保留原有逻辑）
      - run: mkdocs gh-deploy --force

      # 4. 安装 coscmd
      - name: Install coscmd
        run: sudo pip install coscmd

      # 5. 配置并上传到腾讯云 COS
      - name: Deploy to Tencent Cloud COS
        env:
          SECRET_ID: ${{ secrets.COS_SECRET_ID }}   # 在 GitHub Secrets 中配置
          SECRET_KEY: ${{ secrets.COS_SECRET_KEY }} # 在 GitHub Secrets 中配置
          BUCKET: laaerad-distr-1307329113
          REGION: ap-singapore
        run: |
          coscmd config -a $SECRET_ID -s $SECRET_KEY -b $BUCKET -r $REGION
          # -r 递归，-s 同步，-y 自动确认覆盖（解决卡住问题）
          coscmd upload -rs ./site/ / -y
