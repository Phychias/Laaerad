name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: read           # 只需读取代码
  pages: write             # 允许部署到 Pages
  id-token: write          # 用于 OIDC 认证

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install mkdocs-material \
            mkdocs-roamlinks-plugin \
            mkdocs-rss-plugin \
            mkdocs-static-i18n \
            mkdocs-awesome-pages-plugin \
            mkdocs-mermaid2-plugin
      - name: Build site
        run: mkdocs build

      # (可选) 如果还要使用 actions/deploy-pages，则保留 artifact 上传
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      # 上传到腾讯云 COS（放在这里，site 目录存在）
      - name: Install coscmd
        run: sudo pip install coscmd
      - name: Deploy to Tencent Cloud COS
        env:
          SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          BUCKET: laaerad-distr-1307329113
          REGION: ap-singapore
        run: |
          coscmd config -a $SECRET_ID -s $SECRET_KEY -b $BUCKET -r $REGION
          coscmd upload -rs ./site/ / -y
